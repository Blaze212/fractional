name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck-lint-test:
    name: Typecheck, Lint & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      statuses: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - uses: denoland/setup-deno@v2
        with:
          deno-version: 2.1.4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - run: pnpm install --frozen-lockfile
      - name: Dependency vulnerability audit
        run: pnpm audit --audit-level=high

      - run: pnpm typecheck
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm test:unit:coverage

      # - name: Start Supabase local development setup
      #   run: supabase db start
      # - name: Verify generated types are checked in
      #   run: |
      #     supabase gen types typescript --local > types.gen.ts
      #     if ! git diff --ignore-space-at-eol --exit-code --quiet types.gen.ts; then
      #       echo "Detected uncommitted changes after build. See status below:"
      #       git diff
      #       exit 1
      #     fi

  supabase-migrate-and-deploy:
    name: Supabase Migrate & Deploy Functions
    runs-on: ubuntu-latest
    environment:
      name: Production
    needs: [typecheck-lint-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      actions: read
      statuses: write
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      # SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        # fail early with a clear message if any required secret is missing
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Run DB migrations
        run: supabase db push

      - name: Deploy edge functions
        run: supabase functions deploy

  deploy-cloudflare:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    environment:
      name: Production
    needs: [typecheck-lint-test, supabase-migrate-and-deploy]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      CF_DEPLOY_HOOK_PORTAL: ${{ secrets.CF_DEPLOY_HOOK_PORTAL }}

    steps:
      - name: Trigger portal deploy
        run: curl -X POST "$CF_DEPLOY_HOOK_PORTAL"
